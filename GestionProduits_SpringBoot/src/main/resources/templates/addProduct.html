<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajouter Produit</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- MENU -->
<div class="navbar">
    <span class="brand">Gestion Produits</span>
    <a th:href="@{/}">Liste des produits</a>
    <a th:href="@{/add}">Ajouter produit</a>
</div>

<div class="container">
    <div class="card">
        <h2>Ajouter un nouveau produit</h2>

        <form th:action="@{/save}" th:object="${produit}" method="post">

            <label>Nom du produit</label>
            <input type="text" th:field="*{nom}" required />

            <label>Prix (€)</label>
            <input type="number" step="0.01" th:field="*{prix}" required />

            <label>Quantité</label>
            <input type="number" th:field="*{quantite}" required />

            <br><br>
            <button type="submit" class="btn btn-primary">
                Enregistrer
            </button>
            <a th:href="@{/}" class="btn btn-secondary">
                Annuler
            </a>
        </form>
    </div>
</div>

</body>
</html>
