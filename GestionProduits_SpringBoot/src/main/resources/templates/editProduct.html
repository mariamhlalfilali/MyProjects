<body>

<!-- MENU -->
<div class="navbar">
    <span class="brand">Gestion Produits</span>
    <a th:href="@{/}">Liste des produits</a>
    <a th:href="@{/add}">Ajouter produit</a>
</div>

<div class="container">
    <div class="card">
        <h2>Modifier le produit</h2>

        <form th:action="@{/update}" th:object="${produit}" method="post">

            <label>ID</label>
            <input type="text" th:field="*{id}" readonly />

            <label>Nom</label>
            <input type="text" th:field="*{nom}" required />

            <label>Prix (€)</label>
            <input type="number" step="0.01" th:field="*{prix}" required />

            <label>Quantité</label>
            <input type="number" th:field="*{quantite}" required />

            <br><br>
            <button type="submit" class="btn btn-primary">
                Mettre à jour
            </button>
            <a th:href="@{/}" class="btn btn-secondary">
                Annuler
            </a>
        </form>
    </div>
</div>

</body>
